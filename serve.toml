# mev-ant continuous scanning service configuration

rpc_url = "http://192.168.2.180:8547"
db_url = "postgres://mevant:<password>@192.168.2.185:5432/mev_ant"

# Initial block to start scanning from.
# Used only on first run — thereafter the DB scan_state table owns the position.
# Changing this after the service has started has no effect.
from_block = 25298243

# Number of blocks to lag behind chain tip (reorg protection).
delay_blocks = 72

# Port for the management API (dashboard backend).
api_port = 6080

# Path to dashboard static files (build with: cd dashboard && npm run build)
dashboard_dir = "/var/lib/mev-ant/dashboard"
